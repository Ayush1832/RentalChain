version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rentalchain_db
    environment:
      POSTGRES_USER: rentalchain
      POSTGRES_PASSWORD: rentalchain_dev
      POSTGRES_DB: rentalchain
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rentalchain']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
